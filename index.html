      <button onclick="showMenu('desserts', this)">Desserts</button>

    <!-- Ended -->
    <script>
      function showMenu(categoryClass, button) {
        // Remove active class from all sections and buttons
        document.querySelectorAll(".menu-image").forEach((section) => {
          section.classList.remove("active");
        });

        document.querySelectorAll(".categories button").forEach((btn) => {
          btn.classList.remove("active");
        });

        // Show selected menu section
        const menuSection = document.querySelector(
          ".menu-image." + categoryClass,
        );
        if (menuSection) {
          menuSection.classList.add("active");
        } else {
          console.error("Menu section not found:", categoryClass);
        }
        if (button) button.classList.add("active");
      }

      // Register service worker for offline support
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("sw.js").catch(() => {});
        });
      }

      // Initialize breakfast menu on load
      window.addEventListener("DOMContentLoaded", () => {
        const breakfastSection = document.querySelector(
          ".menu-image.promotion",
        );
        if (breakfastSection) {
          breakfastSection.classList.add("active");
        }

        // Interactive category hide/show logic
        let lastScrollTop = 0;
        const categoriesContainer = document.getElementById("categories");
        if (categoriesContainer) {
          // Mouse drag horizontal scrolling for desktop
          let isDown = false;
          let startX;
          let scrollLeft;

          categoriesContainer.addEventListener("mousedown", (e) => {
            isDown = true;
            startX = e.pageX - categoriesContainer.offsetLeft;
            scrollLeft = categoriesContainer.scrollLeft;
          });
          categoriesContainer.addEventListener("mouseleave", () => {
            isDown = false;
          });
          categoriesContainer.addEventListener("mouseup", () => {
            isDown = false;
          });
          categoriesContainer.addEventListener("mousemove", (e) => {
            if (!isDown) return;
            e.preventDefault();
            const x = e.pageX - categoriesContainer.offsetLeft;
            const walk = (x - startX) * 2;
            categoriesContainer.scrollLeft = scrollLeft - walk;
          });

          // Toggle categories visibility when touching/clicking anywhere on the screen
          document.addEventListener("click", function (e) {
            // Do not toggle if the user is just clicking inside the empty area of the categories bar
            // Also ignore if they are dragging (isDown true)
            if (e.target.id === "categories" || isDown) return;

            categoriesContainer.classList.toggle("hidden");
          });

          // Hide categories on scroll down, show on scroll up
          window.addEventListener(
            "scroll",
            function () {
              let currentScroll =
                window.pageYOffset || document.documentElement.scrollTop;
              if (currentScroll > lastScrollTop && currentScroll > 50) {
                // Downscroll
                categoriesContainer.classList.add("hidden");
              } else {
                // Upscroll
                categoriesContainer.classList.remove("hidden");
              }
              lastScrollTop = currentScroll <= 0 ? 0 : currentScroll;
            },
            false,
          );
        }
      });
    </script>
  </body>
</html>
